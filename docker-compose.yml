services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyguard
    environment:
      - NODE_ENV=production
      # Override to pin specific interpreter paths, e.g.
      #   PYGUARD_PYTHON_BINS=/usr/bin/python3.11:/usr/bin/python3.12
      - PYGUARD_PYTHON_BINS=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
